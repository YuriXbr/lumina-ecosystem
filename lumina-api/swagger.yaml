  /expapi/internal/fetchbot:
    get:
      tags: [Internal]
      summary: Fetch bot config (encrypted)
      description: |
        Returns the bot document **AES-256-CBC encrypted** with
        `ENCRYPTION_KEY`. The response body is a hex string in the form
        `<ivHex>:<ciphertextHex>`.

        Requires both the `internal-key` header and the `apiKey` query parameter.
      operationId: fetchBot
      security:
        - internalKey: []
        - apiKeyQuery: []
      parameters:
        - in: query
          name: apiKey
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Encrypted bot document.
          content:
            text/plain:
              schema:
                type: string
                description: "`<ivHex>:<ciphertextHex>` AES-256-CBC payload."
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Bot not configured.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Dados do bot não encontrados.
                code: BOT_NOT_FOUND
        '500':
          $ref: '#/components/responses/ServerError'

  /expapi/internal/updatebot:
    post:
      tags: [Internal]
      summary: Update bot config (encrypted)
      description: |
        Updates the bot document. The body must contain `{ data: <encrypted> }`
        where `<encrypted>` is the AES-256-CBC payload (`<ivHex>:<ciphertextHex>`)
        decrypted with `ENCRYPTION_KEY` to yield the JSON to merge.

        Requires both the `internal-key` header and the `apiKey` query parameter.
      operationId: updateBot
      security:
        - internalKey: []
        - apiKeyQuery: []
      parameters:
        - in: query
          name: apiKey
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [data]
              properties:
                data:
                  type: string
                  description: AES-256-CBC encrypted JSON (`<ivHex>:<ciphertextHex>`).
      responses:
        '200':
          description: Bot config updated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '400':
          description: Missing `data`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Campo data (encriptado) é obrigatório.
                code: MISSING_DATA
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/ServerError'

  /expapi/internal/staff:
    get:
      tags: [Internal]
      summary: Fetch bot staff lists
      description: |
        Returns the bot's `owners`, `admins`, and `moderators` arrays.

        Requires the `apiKey` query parameter (does **not** require
        `internal-key`).
      operationId: fetchStaff
      security:
        - apiKeyQuery: []
      parameters:
        - in: query
          name: apiKey
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Staff lists.
          content:
            application/json:
              schema:
                type: object
                properties:
                  owners:
                    type: array
                    items:
                      type: string
                  admins:
                    type: array
                    items:
                      type: string
                  moderators:
                    type: array
                    items:
                      type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Bot not configured.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Dados do bot não encontrados.
                code: BOT_NOT_FOUND
        '500':
          $ref: '#/components/responses/ServerError'

  /expapi/internal/commandlog:
    post:
      tags: [Internal]
      summary: Log a Discord command execution
      description: |
        Persists a command-execution event from the bot into the central log
        store (queryable via `GET /expapi/v1/admin/logs?type=COMMAND`).
        Fire-and-forget — the bot does not wait for the write to complete.
      operationId: commandLog
      security:
        - internalKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action, message]
              properties:
                level:
                  type: string
                  enum: [info, warn, error, debug]
                  default: info
                type:
                  type: string
                  default: COMMAND
                action:
                  type: string
                  maxLength: 200
                message:
                  type: string
                  maxLength: 2000
                durationMs:
                  type: integer
                userId:
                  type: string
                guildId:
                  type: string
                extra:
                  type: object
                  additionalProperties: true
            example:
              action: command.play
              message: User invoked /play track=Song
              userId: '123456789012345678'
              guildId: '987654321098765432'
              durationMs: 142
      responses:
        '200':
          description: Accepted.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/ServerError'

  /expapi/internal/rollskin:
    post:
      tags: [Internal]
      summary: Roll a skin (bot-side)
      description: |
        Spends a key + chest of the given type and rolls a random skin for
        the given Discord user. Used by the bot when a user invokes the
        `/roll` slash command.
      operationId: rollSkinInternal
      security:
        - internalKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId, chestType]
              properties:
                userId:
                  type: string
                chestType:
                  type: string
                  enum: [masterWorkChests, hextechChests]
      responses:
        '200':
          description: Skin rolled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Skin'
        '400':
          description: Missing params, invalid chest type, or insufficient resources.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missing:
                  value:
                    error: Parâmetros userId e chestType são obrigatórios.
                    code: MISSING_PARAMS
                invalid:
                  value:
                    error: Tipo de baú inválido.
                    code: INVALID_CHEST_TYPE
                insufficient:
                  value:
                    error: Sem chaves ou baús suficientes.
                    code: INSUFFICIENT_RESOURCES
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/ServerError'

  /expapi/internal/addskin:
    post:
      tags: [Internal]
      summary: Add a skin to a user's inventory
      description: Grants a specific skin (by `skinId`) to a Discord user.
      operationId: addSkin
      security:
        - internalKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId, skinId]
              properties:
                userId:
                  type: string
                skinId:
                  type: integer
      responses:
        '200':
          description: Skin added. Returns the result of the skin-service operation.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/ServerError'

  /expapi/internal/claimdaily:
    post:
      tags: [Internal]
      summary: Claim daily reward (bot-side)
      description: |
        Claims the daily reward for a Discord user. Called by the bot when
        the user invokes `/daily`.
      operationId: claimDailyInternal
      security:
        - internalKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId]
              properties:
                userId:
                  type: string
      responses:
        '200':
          description: Reward claimed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DailyRewardResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          description: Already claimed today.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                claimed: false
                nextDailyReward: '2025-01-02T00:00:00.000Z'
                streak: 5
                error: Recompensa diária já resgatada.
                code: DAILY_ALREADY_CLAIMED
        '500':
          $ref: '#/components/responses/ServerError'

  /expapi/internal/newpunishrecord:
    post:
      tags: [Internal]
      summary: Create a punishment record
      description: |
        Creates a new `ban`, `mute`, or `warn` record against a target user in
        a specific guild. Dispatches to `BanListService`, `MuteListService`,
        or `WarnListService` based on `type`.
      operationId: newPunishRecord
      security:
        - internalKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type, guildId, targetId, staffId]
              properties:
                type:
                  type: string
                  enum: [ban, mute, warn]
                guildId:
                  type: string
                targetId:
                  type: string
                  description: Discord ID of the user being punished.
                staffId:
                  type: string
                  description: Discord ID of the staff member issuing the punishment.
                reason:
                  type: string
                endTime:
                  type: string
                  format: date-time
                  nullable: true
                  description: When the punishment expires (null = permanent).
      responses:
        '200':
          description: Punishment record created.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '400':
          description: Missing params or invalid type.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                missing:
                  value:
                    error: Parámetros type, guildId, targetId e staffId são obrigatórios.
                    code: MISSING_PARAMS
                invalid_type:
                  value:
                    error: Tipo de punição inválido.
                    code: INVALID_TYPE
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/ServerError'

  /expapi/internal/modifypunishrecord:
    post:
      tags: [Internal]
      summary: Modify a punishment record (whitelisted fields)
      description: |
        Updates an existing punishment record. Only the fields `reason`,
        `endTime`, and `staffId` are accepted (defense-in-depth against
        mass-assignment — `_id`, `guildId`, `targetId`, `startTime`, etc.
        cannot be overwritten).
      operationId: modifyPunishRecord
      security:
        - internalKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type, guildId, targetId, updateData]
              properties:
                type:
                  type: string
                  enum: [ban, mute, warn]
                guildId:
                  type: string
                targetId:
                  type: string
                updateData:
                  type: object
                  properties:
                    reason:
                      type: string
                    endTime:
                      type: string
                      format: date-time
                      nullable: true
                    staffId:
                      type: string
      responses:
        '200':
          description: Punishment record modified.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '400':
          description: Missing params, invalid type, or no whitelisted fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: "Nenhum campo válido para atualização. Campos permitidos: reason, endTime, staffId."
                code: NO_VALID_FIELDS
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/ServerError'

  /expapi/internal/removepunishrecord:
    post:
      tags: [Internal]
      summary: Remove a punishment record
      description: |
        Removes the punishment record of the given `type` for `targetId` in
        `guildId`.
      operationId: removePunishRecord
      security:
        - internalKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type, guildId, targetId]
              properties:
                type:
                  type: string
                  enum: [ban, mute, warn]
                guildId:
                  type: string
                targetId:
                  type: string
      responses:
        '200':
          description: Punishment record removed.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '400':
          description: Missing params or invalid type.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Parámetros type, guildId e targetId são obrigatórios.
                code: MISSING_PARAMS
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/ServerError'

  # ─── Badge System ──────────────────────────────────────────────────────────

  /expapi/v1/badges/my:
    get:
      tags: [Badges]
      summary: List authenticated user's badges
      description: Returns all badges redeemed by the authenticated user, sorted by rarity (mythic first) then by redemption date (most recent first).
      security:
        - cookieAuth: []
        - bearerAuth: []
      responses:
        '200':
          description: User's badges
          content:
            application/json:
              schema:
                type: object
                properties:
                  badges:
                    type: array
                    items:
                      $ref: '#/components/schemas/UserBadge'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/ServerError'

  /expapi/v1/badges/redeem:
    post:
      tags: [Badges]
      summary: Redeem a badge code
      description: |
        Redeems a badge using a code. Validates:
          1. Code exists and badge is active
          2. Badge is within the redemption window (availableFrom ≤ now < expiresAt)
          3. User has not already redeemed this badge
          4. User meets the minimum access level requirement
          5. Max redemptions limit not exceeded
      security:
        - cookieAuth: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code:
                  type: string
                  description: Badge redemption code (case-insensitive, auto-uppercased)
                  example: BETA2025
      responses:
        '200':
          description: Badge redeemed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  badge:
                    $ref: '#/components/schemas/Badge'
        '400':
          description: Missing code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Badge inactive, expired, not yet available, or user lacks access level
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Badge code not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: User already redeemed this badge
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /expapi/v1/badges/user/{identifier}:
    get:
      tags: [Badges]
      summary: List public badges of a user
      description: |
        Returns the public badges of a user identified by accountId, username, or Discord ID.
        Only returns badges if the target user has `publicProfile` enabled.
      parameters:
        - name: identifier
          in: path
          required: true
          schema:
            type: string
          description: User identifier (MongoDB ObjectId, username, or Discord ID)
      responses:
        '200':
          description: User's public badges
          content:
            application/json:
              schema:
                type: object
                properties:
                  badges:
                    type: array
                    items:
                      $ref: '#/components/schemas/UserBadge'
                  username:
                    type: string
                  displayName:
                    type: string
        '403':
          description: Profile is private
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /expapi/v1/admin/badges:
    get:
      tags: [Admin]
      summary: List all badges (admin)
      description: Returns all badges with redemption counts. Requires admin+ access level.
      security:
        - cookieAuth: []
        - bearerAuth: []
      responses:
        '200':
          description: All badges
          content:
            application/json:
              schema:
                type: object
                properties:
                  badges:
                    type: array
                    items:
                      $ref: '#/components/schemas/BadgeWithCount'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [Admin]
      summary: Create a new badge (admin)
      description: Creates a new badge with a unique redemption code. Requires admin+ access level.
      security:
        - cookieAuth: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BadgeCreate'
      responses:
        '201':
          description: Badge created
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  badge:
                    $ref: '#/components/schemas/Badge'
        '400':
          description: Invalid input (code too short, invalid rarity, etc.)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Badge code already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /expapi/v1/admin/badges/{code}:
    delete:
      tags: [Admin]
      summary: Delete a badge (admin)
      description: |
        Deletes a badge by its code. Requires admin+ access level.
        Note: Does NOT delete userBadge records — they become orphaned and are
        filtered out as null in getMyBadges/getUserBadges responses.
      security:
        - cookieAuth: []
        - bearerAuth: []
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
          description: Badge code (case-insensitive)
      responses:
        '200':
          description: Badge deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '404':
          description: Badge not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /expapi/internal/createbadge:
    post:
      tags: [Internal]
      summary: Create a badge via bot (internal)
      description: |
        Internal endpoint called by the bot when an admin uses `/createbadge`.
        The bot passes the Discord ID of the admin; the API looks up the linked
        account and verifies admin+ permission before creating the badge.
      security:
        - internalKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [discordUserId, code, name]
              properties:
                discordUserId:
                  type: string
                  description: Discord ID of the admin creating the badge
                code:
                  type: string
                  description: Unique redemption code (3+ chars)
                name:
                  type: string
                description:
                  type: string
                imageUrl:
                  type: string
                rarity:
                  type: string
                  enum: [common, rare, epic, legendary, mythic]
                highlightColor:
                  type: string
                  description: Hex color (e.g. #8B5CF6)
                maxRedemptions:
                  type: integer
                  description: 0 = unlimited
                minAccessLevel:
                  type: string
                  description: Minimum access type required to redeem
      responses:
        '201':
          description: Badge created
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  badge:
                    $ref: '#/components/schemas/Badge'
        '403':
          description: Insufficient permission (not admin+)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /expapi/internal/redeembadge:
    post:
      tags: [Internal]
      summary: Redeem a badge via bot (internal)
      description: |
        Internal endpoint called by the bot when a user uses `/redeem`.
        The bot passes the Discord ID of the user; the API looks up the linked
        account and records the redemption.
      security:
        - internalKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [discordUserId, code]
              properties:
                discordUserId:
                  type: string
                  description: Discord ID of the user redeeming the badge
                code:
                  type: string
                  description: Badge redemption code
      responses:
        '200':
          description: Badge redeemed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  badge:
                    $ref: '#/components/schemas/Badge'
        '403':
          description: Badge inactive, expired, or user lacks access level
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Badge or account not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Already redeemed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
