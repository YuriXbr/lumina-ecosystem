  /expapi/internal/fetchuserskins:
    get:
      tags: [Internal]
      summary: Fetch a user's skins (public, rate-limited)
      description: |
        Returns the list of skins owned by a Discord user. Intentionally
        public (skins are visible on the dashboard) but rate-limited at
        120 req/min per IP.

        `userId` may be passed as a query parameter (GET) or in the body (POST).
        Non-numeric characters are stripped from `userId` before lookup.
      operationId: fetchUserSkins
      security: []
      parameters:
        - in: query
          name: userId
          required: true
          schema:
            type: string
          description: Discord user ID (digits only).
      responses:
        '200':
          description: User's skins.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
        '400':
          description: Missing or invalid `userId`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Parámetro userId é obrigatório.
                code: MISSING_USER_ID
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/ServerError'
    post:
      tags: [Internal]
      summary: Fetch a user's skins (public, rate-limited)
      description: Same semantics as the GET variant; `userId` is read from the body.
      operationId: fetchUserSkinsPost
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId]
              properties:
                userId:
                  type: string
      responses:
        '200':
          description: User's skins.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
        '400':
          $ref: '#/components/responses/BadRequest'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/ServerError'

  /expapi/internal/fetchinventory:
    get:
      tags: [Internal]
      summary: Fetch a user's inventory (public, rate-limited)
      description: |
        Returns the inventory document for a Discord user. Intentionally
        public but rate-limited at 120 req/min per IP.
      operationId: fetchInventory
      security: []
      parameters:
        - in: query
          name: userId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Inventory document.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Inventory'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          description: Inventory not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Inventário não encontrado.
                code: INVENTORY_NOT_FOUND
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/ServerError'
    post:
      tags: [Internal]
      summary: Fetch a user's inventory (public, rate-limited)
      description: Same as GET; `userId` from body.
      operationId: fetchInventoryPost
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId]
              properties:
                userId:
                  type: string
      responses:
        '200':
          description: Inventory document.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Inventory'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/ServerError'

  /expapi/internal/addinventory:
    post:
      tags: [Internal]
      summary: Add items to a user's inventory
      description: |
        Adds the given `amount` of `item` to the user's inventory. `item` is
        a field name on the inventory document (e.g. `keys`,
        `masterWorkChests`, `hextechChests`).
      operationId: addInventory
      security:
        - internalKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId, item, amount]
              properties:
                userId:
                  type: string
                item:
                  type: string
                amount:
                  type: integer
            example:
              userId: '123456789012345678'
              item: keys
              amount: 5
      responses:
        '200':
          description: Inventory updated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/ServerError'

  /expapi/internal/newguild:
    post:
      tags: [Internal]
      summary: Register a new guild
      description: Creates a new guild record when the bot joins a server.
      operationId: newGuild
      security:
        - internalKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [guildId, ownerId, guildName]
              properties:
                guildId:
                  type: string
                ownerId:
                  type: string
                guildName:
                  type: string
            example:
              guildId: '123456789012345678'
              ownerId: '987654321098765432'
              guildName: My Cool Server
      responses:
        '200':
          description: Guild created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Guild'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: Guild already exists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Guilda já existe.
                code: GUILD_ALREADY_EXISTS
        '500':
          $ref: '#/components/responses/ServerError'

  /expapi/internal/updateguilddata:
    post:
      tags: [Internal]
      summary: Update a guild (whitelisted fields only)
      description: |
        Updates the guild document. Only fields in the bot whitelist are
        accepted; everything else is silently dropped (defense-in-depth against
        mass-assignment even if the internal key leaks).

        **Whitelisted fields:**
        `guildReferenceName`, `muteRoleId`, `banRoleId`, `moderationChannelId`,
        `memberCount`, `memberWelcomeToggle`, `memberJoinChannelId`,
        `memberJoinMessage`, `memberLeaveChannelId`, `memberLeaveMessage`,
        `memberJoinDmMessage`, `memberDmToggle`, `prefix`, `djEnabled`,
        `djRoleId`, `persistentMute`, `persistentWarns`, `warnsToMute`,
        `warnsToTimeOut`, `warnsToKick`, `warnsToBan`, `autoWarnPunishment`,
        `botInfoChannelId`, `eventLogChannelId`, `guildLocale`, `canPunishStaff`,
        `blockedChannels`, `gachaRolls`, `gachaMaxRolls`, `gachaGameMode`,
        `gachaRollsRefreshInterval`, `gachaRollsLastRefresh`.
      operationId: updateGuildData
      security:
        - internalKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [guildId]
              properties:
                guildId:
                  type: string
                guildReferenceName:
                  type: string
                prefix:
                  type: string
                guildLocale:
                  type: string
                memberCount:
                  type: integer
              additionalProperties: true
            example:
              guildId: '123456789012345678'
              prefix: 'l!'
              memberCount: 250
      responses:
        '200':
          description: Guild updated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  updatedFields:
                    type: array
                    items:
                      type: string
                  updatedGuild:
                    $ref: '#/components/schemas/Guild'
        '400':
          description: Missing `guildId` or no valid whitelisted fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Nenhum campo válido para atualização.
                code: NO_VALID_FIELDS
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/ServerError'

  /expapi/internal/deleteguild:
