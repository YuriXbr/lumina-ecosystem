          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Guilda não encontrada.
                code: GUILD_NOT_FOUND
        '500':
          $ref: '#/components/responses/ServerError'
    delete:
